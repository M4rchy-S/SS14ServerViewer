services:
  backend:
    build:
      context: ./back
      dockerfile: ./Dockerfile
    networks:
      - app-network
  frontend:
    build:
      context: ./front
      dockerfile: ./Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
